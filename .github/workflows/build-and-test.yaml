name: Build and Test

on: [push, pull_request]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --force

      - name: Build
        run: pnpm build

      - name: Generate typed-openapi fixtures for CI typecheck
        run: pnpm --filter typed-openapi run gen:fixtures

      - name: Type check generated client and integration tests
        run: pnpm --filter typed-openapi run typecheck:ci

      - name: Test all (unit, types, attest, matrix, runtime, bench)
        run: pnpm --filter typed-openapi test:all

      - name: Test web package
        run: pnpm --filter typed-openapi-web exec vitest run

      - name: Release package
        run: pnpm dlx pkg-pr-new publish './packages/typed-openapi'
