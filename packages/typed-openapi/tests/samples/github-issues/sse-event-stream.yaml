openapi: 3.0.3
info:
  title: SSE sample
  version: 1.0.0
paths:
  /events:
    get:
      operationId: streamEvents
      responses:
        "200":
          description: Server-sent events
          content:
            text/event-stream:
              schema:
                type: string
  /pets:
    get:
      operationId: listPets
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                  required:
                    - id
