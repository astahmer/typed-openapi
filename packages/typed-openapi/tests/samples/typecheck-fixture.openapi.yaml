openapi: 3.0.3
info:
  title: Typecheck fixture
  version: 1.0.0
paths: {}
components:
  schemas:
    Person:
      type: object
      required: [name, email, age]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        age:
          type: integer
          minimum: 0
        tags:
          type: array
          items:
            type: string
          minItems: 0
        status:
          type: string
          enum: [active, inactive]
        nickname:
          type: string
          nullable: true
